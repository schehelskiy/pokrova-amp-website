{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="auth-page-wrapper" style="background: #000; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="auth-container p-5 text-center text-white" style="max-width: 500px; background: #111; border-radius: 20px; border: 1px solid #333;">
        <h2 class="fw-bold text-warning mb-4">Завершення входу...</h2>
        <p>Зачекайте секунду, ми налаштовуємо ваш профіль ФК Покрова.</p>

        <form id="signup_form" method="post" action="{% url 'socialaccount_signup' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-warning w-100 fw-bold py-3">Продовжити</button>
        </form>
    </div>
</div>

<script>
    // Автоматично натискаємо кнопку, щоб юзер не чекав
    window.onload = function() {
        document.getElementById('signup_form').submit();
    };
</script>
{% endblock %}
